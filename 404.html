<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Fenrir Foundation</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" />
  <style>
    :root {
      --text: #d8d8d8;
      --muted: #9a9a9a;
      --silver: #b9b9b9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #050505 0%, #010101 100%);
      text-align: center;
      padding: 40px 20px;
    }

    .code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      color: rgba(255,255,255,0.06);
      line-height: 1;
      user-select: none;
    }

    h1 {
      margin-top: 12px;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #ededed;
    }

    p {
      margin-top: 16px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
      max-width: 420px;
    }

    a {
      display: inline-block;
      margin-top: 36px;
      padding: 14px 28px;
      border: 1px solid rgba(183,183,183,0.2);
      border-radius: 999px;
      color: var(--silver);
      font-size: 0.92rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.25s, color 0.25s;
    }

    a:hover {
      border-color: rgba(183,183,183,0.5);
      color: #fff;
    }

    a:focus-visible {
      outline: 2px solid rgba(255,255,255,0.7);
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <div class="code" aria-hidden="true">404</div>
  <h1>Page Not Found</h1>
  <p>The page you are looking for does not exist or has been moved. Return to the main site to continue.</p>
  <a href="/">Return to Fenrir Foundation</a>
</body>
</html>
